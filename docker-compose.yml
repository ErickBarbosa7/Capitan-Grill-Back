version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cap_grill
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-capitan_secret}
      POSTGRES_DB: ${DB_NAME:-capitan_grill_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
    name: capitan_grill_pgdata